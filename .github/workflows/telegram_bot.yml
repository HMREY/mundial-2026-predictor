name: Bot Telegram - Apuestas del Día

on:
  schedule:
    - cron: '0 10 * * *'   # diario a las 10:00 UTC
  workflow_dispatch:        # ejecución manual desde la web de GitHub

jobs:
  enviar_alertas_push:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar pipeline quant y alerta de Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          # 1. El runner es un entorno estéril: primero datos frescos del día
          python pipeline_total.py --update-only || echo "pipeline con avisos, se continúa"
          # 2. Calcular los picks y enviar el resumen
          python bot_telegram.py
