name: Reentrenar modelos de ligas (datos frescos)

# CAUSA RAÍZ (v51): los modelos de liga solo se refrescaban con un commit
# manual, así que `team_stats_*.json` se quedaba semanas atrás y la UI marcaba
# "sin datos nuevos desde hace 60+ días". Este workflow reentrena todas las
# ligas con los CSV más recientes de football-data y commitea los artefactos,
# de modo que Streamlit Cloud (que despliega desde el repo) siempre sirva
# modelos al día. Las ligas en receso no cambian (no hay datos nuevos) — es
# correcto y honesto.

on:
  schedule:
    - cron: '0 6 * * 1,4'   # lunes y jueves 06:00 UTC (2 veces/semana)
  workflow_dispatch:          # ejecución manual desde la web de GitHub

# permiso para que el runner pueda commitear los modelos actualizados
permissions:
  contents: write

concurrency:
  group: retrain-leagues
  cancel-in-progress: false

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Reentrenar todas las ligas disponibles
        run: |
          # league_engine --build descarga los CSV frescos de football-data y
          # reentrena cada liga disponible. Un fallo puntual no aborta el resto.
          python league_engine.py --build || echo "reentrenamiento con avisos, se continúa"

      - name: Commitear artefactos actualizados (si cambiaron)
        run: |
          git config user.name  "retrain-bot"
          git config user.email "actions@github.com"
          git add -A team_stats_*.json modelos/ historico_*.csv roi_bets_*.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Sin cambios en los modelos (ligas en receso). Nada que commitear."
          else
            fecha=$(date -u +%Y-%m-%d)
            git commit -m "chore(datos): reentrenamiento automático de ligas ($fecha)"
            git push
            echo "Modelos actualizados y publicados."
          fi
